<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIREWORKS CAD - 入り口</title>
    <style>
        /* 背景に画像を入れ、前景を引き立てるデザイン */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 👇 ここで背景画像を指定します */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), url('fireworks_bg.jpg');
            background-size: cover;
            /* 画像を画面いっぱいに広げる */
            background-position: center;
            /* 画像の中央を表示 */
            background-attachment: fixed;
            /* 画面スクロール時に画像を固定（もしスクロールがあれば） */
            background-color: #050505;
            /* 画像が読み込まれるまでのフォールバック色 */
            color: #eee;
        }

        /* 中央のコンテンツをまとめるカード（グラスモーフィズム） */
        .container {
            text-align: center;
            background: rgba(34, 34, 34, 0.7);
            /* 半透明のグレー */
            -webkit-backdrop-filter: blur(10px);
            /* すりガラス効果 */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 80px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* 柔らかく上品な影 */
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            /* 少しフワッと浮き上がる演出 */
        }

        /* タイトルのデザイン（白色に） */
        h1 {
            font-size: 28px;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            font-weight: 300;
            color: #fff;
        }

        /* サブタイトルのデザイン（少し明るく） */
        p {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 1px;
            margin: 0 0 40px 0;
        }

        /* シミュレーターへ進むボタン（ゴールドに） */
        .launch-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 14px;
            letter-spacing: 2px;
            color: #333;
            /* 文字は黒っぽくして視認性を確保 */
            background-color: #f1c40f;
            /* 花火の光をイメージしたゴールド */
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .launch-btn:hover {
            background-color: #e67e22;
            /* ホバー時は少し暗めのオレンジに */
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>FIREWORKS CAD</h1>
        <p>Interactive Physics & Chemistry Simulator</p>

        <a href="./media_project/index_simulator.html" class="launch-btn">ENTER SIMULATOR</a>
    </div>

</body>

</html>
